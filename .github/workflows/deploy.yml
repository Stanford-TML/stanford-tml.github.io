# FILE: .github/workflows/deploy.yml
name: Deploy to GitHub Pages

on:
  # Runs on pushes targeting the main branch
  push:
    branches: ["main"]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm' # Change to 'yarn' or 'pnpm' if you use those
          
      - name: Install dependencies
        run: npm ci # Or yarn install / pnpm install

      - name: Setup ImageMagick
        uses: mfinelli/setup-imagemagick@v5

      - name: Optimize images and generate placeholders
        run: |
          if [ -d "public/assets" ]; then
            cd public/assets
            
            # globstar = allows **/* to search recursively through all subfolders
            # nullglob = prevents errors if no images are found
            # nocaseglob = catches both .jpg and .JPG extensions
            shopt -s globstar nullglob nocaseglob
            
            for img in **/*.{jpg,jpeg,png,webp}; do
              # Ensure we aren't re-processing an already generated _small image
              if [[ "$img" != *_small.* ]]; then
                filename="${img%.*}"
                extension="${img##*.}"
                small_img="${filename}_small.${extension}"
                
                # 1. OPTIMIZE THE HIGH-RES IMAGE
                echo "Optimizing high-res image: $img"
                magick "$img" -resize "2000x2000>" -strip -quality 85 "$img"
                
                # 2. GENERATE LOW-RES PLACEHOLDER
                if [ ! -f "$small_img" ]; then
                  echo "Generating low-res placeholder for $img"
                  magick "$img" -resize "50x50>" -strip -quality 50 "$small_img"
                fi
              fi
            done
          else
            echo "Directory public/assets not found, skipping."
          fi
        
      - name: Build project
        run: npm run build
      
      - name: Generate 404 page for GitHub Pages
        run: cp dist/index.html dist/404.html
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # Vite outputs the build to the 'dist' folder

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
